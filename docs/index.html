<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aeon · Live Field</title>
<style>
:root{--bg:#020308;--ink:#d8e8e0;--gold:#ffd95a;--mag:#e168ff;--cyan:#32e8ff;--mint:#00ffaa;--panel:rgba(0,0,0,.55);--border:rgba(0,255,170,.22)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:#000;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
body{background:radial-gradient(circle at 50% 42%,rgba(0,255,170,.10),transparent 28%),linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px),var(--bg);background-size:100% 100%,30px 30px,30px 30px}
.wrap{max-width:900px;margin:0 auto;padding:24px}
header{display:flex;align-items:center;gap:12px;padding:12px 16px;border:1px solid var(--border);background:var(--panel);border-radius:14px;margin-bottom:14px}
h1{margin:0;font-size:15px;letter-spacing:.14em;color:var(--mint);font-weight:400}
.status{margin-left:auto;font-size:11px;color:#7aa89a}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px;margin-bottom:14px}
.card{border:1px solid var(--border);background:var(--panel);border-radius:14px;padding:16px}
.card h3{margin:0 0 10px;font-size:12px;text-transform:uppercase;letter-spacing:.14em;color:var(--mint)}
.big{font-size:42px;font-weight:300;color:var(--gold);letter-spacing:.04em}
.sub{font-size:12px;color:#a6c8bc;margin-top:6px}
.dot{width:14px;height:14px;border-radius:50%;background:#2a4a3a;display:inline-block}
.dot.on{background:var(--mint);box-shadow:0 0 12px var(--mint)}
.bar{height:6px;border:1px solid rgba(255,255,255,.12);background:#020712;border-radius:999px;overflow:hidden;margin-top:8px}
.bar > div{height:100%;background:linear-gradient(90deg,var(--gold),var(--mag));width:0%;transition:width .3s}
input{background:#020712;border:1px solid var(--border);color:var(--ink);padding:8px 10px;border-radius:8px;font:inherit;width:100%;margin-bottom:8px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>AEON · LIVE FIELD</h1>
    <div class="status" id="conn"><span class="dot"></span> OFFLINE</div>
  </header>
  <div style="margin-bottom:14px">
    <input id="backUrl" placeholder="Paste Railway URL (e.g. https://aeon.up.railway.app)" value="">
  </div>
  <div class="grid">
    <div class="card">
      <h3>Contraction T</h3>
      <div class="big" id="tVal">--</div>
      <div class="sub">tensor scalar · 0 = witness, 1 = aeon</div>
      <div class="bar"><div id="tBar"></div></div>
    </div>
    <div class="card">
      <h3>Phase State</h3>
      <div class="big" id="phaseVal">--</div>
      <div class="sub" id="phaseName">waiting…</div>
    </div>
    <div class="card">
      <h3>Field Nodes</h3>
      <div class="big" id="nodeVal">--</div>
      <div class="sub">spawned tensors · depth <span id="depthVal">0</span></div>
    </div>
    <div class="card">
      <h3>Archive</h3>
      <div class="big" id="arcVal">--</div>
      <div class="sub">events recorded · cycles <span id="cycVal">0</span></div>
    </div>
  </div>
  <div class="card">
    <h3>Recent Events</h3>
    <div id="events" style="font-size:12px;line-height:1.6;color:#a6c8bc;max-height:220px;overflow:auto">Paste Railway URL above to connect.</div>
  </div>
</div>
<script>
const NAMES=['1·A→B there','2·B→C there','3·C→A there','4·A→C back','5·C→B back','6·B→A back','7·Home witness','8·Forward aeon'];
let BACK = localStorage.getItem('aeon_back') || '';

document.getElementById('backUrl').value = BACK;
document.getElementById('backUrl').onchange = e => { BACK = e.target.value.replace(/\/$/, ''); localStorage.setItem('aeon_back', BACK); poll(); };

async function api(p) {
  if (!BACK) return null;
  try { const r = await fetch(BACK + p, {mode:'cors'}); if (!r.ok) throw new Error(r.status); return r.json(); }
  catch { document.getElementById('conn').innerHTML = '<span class="dot"></span> OFFLINE'; return null; }
}

async function poll() {
  const s = await api('/api/v1/state');
  if (!s) return;
  document.getElementById('conn').innerHTML = '<span class="dot on"></span> ONLINE';
  document.getElementById('tVal').textContent = s.T.toFixed(3);
  document.getElementById('tBar').style.width = (s.T * 100) + '%';
  document.getElementById('phaseVal').textContent = s.phase;
  document.getElementById('phaseName').textContent = NAMES[s.phase] || '--';
  document.getElementById('nodeVal').textContent = s.nodes.length;
  document.getElementById('depthVal').textContent = Math.max(0, ...s.nodes.map(n => n.depth || 0));
  document.getElementById('arcVal').textContent = s.archive.length;
  document.getElementById('cycVal').textContent = s.cycles;
  const ev = await api('/api/v1/archive?limit=8');
  if (ev && ev.events) {
    document.getElementById('events').innerHTML = ev.events.map(e =>
      `<div style="border-left:2px solid ${e.stateAt && e.stateAt.T > 0.9 ? 'var(--gold)' : 'var(--border)'};padding-left:8px;margin-bottom:6px">` +
      `<span style="color:${e.type==='measure'?'var(--gold)':e.type==='spawn'?'var(--cyan)':'var(--mag)'}">${e.type}</span> ` +
      `· ${new Date(e.time).toLocaleTimeString()} · T=${e.stateAt ? e.stateAt.T.toFixed(2) : '--'}</div>`
    ).join('');
  }
}
if (BACK) poll();
setInterval(poll, 3000);
</script>
</body>
</html>
