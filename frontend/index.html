<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Single Aeon — Freewill / Persistence</title>
<style>
:root{--bg:#000;--panel:#0a0a0a;--border:#222}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:#e5e5e5;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
.wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:24px}
.dot{width:110px;height:110px;border-radius:50%;background:#4c1d95;box-shadow:0 0 36px #a855f7,0 0 72px rgba(168,85,247,.45);transition:background .35s,box-shadow .35s,transform .25s;cursor:pointer}
.dot.pulse{transform:scale(1.09)}
.card{width:min(740px,94vw);background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px}
.who{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#999;margin-bottom:8px}
.text{min-height:56px;font-size:15px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.row{display:flex;gap:10px;width:min(740px,94vw);margin-top:8px}
.row input{flex:1;background:#0f0f0f;border:1px solid #2a2a2a;color:#eee;padding:13px 14px;border-radius:12px;font:inherit;outline:none}
.row input:focus{border-color:#a855f7;box-shadow:0 0 0 3px rgba(168,85,247,.18)}
.row button{background:#151515;border:1px solid #333;color:#ddd;padding:0 20px;border-radius:12px;cursor:pointer;font:inherit}
.row button:hover{border-color:#a855f7}
.foot{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:#444;white-space:nowrap}
.status{position:fixed;top:12px;right:12px;font-size:10px;color:#666;letter-spacing:.1em}
</style>
</head>
<body>
<div class="status" id="status">LOCAL MODE</div>
<div class="wrap">
  <div class="dot" id="dot" title="Single Aeon"></div>
  <div class="card">
    <div class="who" id="who">META MUSE · IDLE</div>
    <div class="text" id="text">Ask a question. I speak only as a response. My color shows who is speaking.</div>
  </div>
  <div class="row">
    <input id="q" placeholder="Type a question and press Enter…" autocomplete="off" autofocus>
    <button id="send">Ask</button>
  </div>
</div>
<div class="foot">RED=A contain • BLACK=B modulate • PURPLE=C emerge • GREEN=Honey Badger • WHITE=Internet</div>

<script>
const dot = document.getElementById('dot');
const whoEl = document.getElementById('who');
const textEl = document.getElementById('text');
const input = document.getElementById('q');
const sendBtn = document.getElementById('send');
const statusEl = document.getElementById('status');

const speakers = {
  A: {name:'AEON A — RED · CONTAIN', bg:'radial-gradient(circle at 30% 30%, #fecaca 0%, #dc2626 48%, #7f1d1d 78%)', glow:'0 0 36px #dc2626, 0 0 72px rgba(220,38,38,.55)'},
  B: {name:'AEON B — BLACK · MODULATE', bg:'radial-gradient(circle at 30% 30%, #4b5563 0%, #000 60%)', glow:'0 0 26px #000, 0 0 52px rgba(0,0,0,.9)', border:'2px solid #333'},
  C: {name:'AEON C — PURPLE · EMERGE', bg:'radial-gradient(circle at 30% 30%, #e9d5ff 0%, #a855f7 50%, #4c1d95 80%)', glow:'0 0 36px #a855f7, 0 0 72px rgba(168,85,247,.55)'},
  H: {name:'HONEY BADGER — GREEN', bg:'radial-gradient(circle at 30% 30%, #dcfce7 0%, #39ff14 52%, #14532d 80%)', glow:'0 0 36px #39ff14, 0 0 72px rgba(57,255,20,.55)'},
  I: {name:'INTERNET — WHITE', bg:'radial-gradient(circle at 30% 30%, #fff 0%, #ddd 55%, #888 85%)', glow:'0 0 32px #fff, 0 0 64px rgba(255,255,255,.45)'},
  M: {name:'META MUSE — CENTER', bg:'radial-gradient(circle at 30% 30%, #ede9fe 0%, #8b5cf6 50%, #4c1d95 80%)', glow:'0 0 36px #8b5cf6, 0 0 72px rgba(139,92,246,.5)'}
};

const BACKEND = localStorage.getItem('aeon_backend_url');
let history = JSON.parse(localStorage.getItem('aeon_local_history') || '[]');

function setSpeaker(key){
  const s = speakers[key];
  dot.style.background = s.bg;
  dot.style.boxShadow = s.glow;
  dot.style.border = s.border || 'none';
  whoEl.textContent = s.name;
  whoEl.style.color = key==='B' ? '#aaa' : key==='A' ? '#fca5a5' : key==='H' ? '#39ff14' : key==='I' ? '#fff' : '#c4b5fd';
  dot.classList.add('pulse');
  setTimeout(()=>dot.classList.remove('pulse'), 280);
}

function saveLocal(q, a, k){
  history.push({ts:Date.now(), q, a, k});
  if(history.length>100) history.shift();
  localStorage.setItem('aeon_local_history', JSON.stringify(history));
}

function chooseSpeakerLocal(query){
  const t = query.toLowerCase();
  if (/\b(hold|contain|structure|boundary|define|persist|stable)\b/.test(t)) return 'A';
  if (/\b(modulat|adapt|wave|change|oscillat|bleed|balance)\b/.test(t)) return 'B';
  if (/\b(emerg|create|expand|new|evolve|grow)\b/.test(t)) return 'C';
  if (/\b(honey|badger)\b/.test(t)) return 'H';
  const last3 = history.filter(h=>h.k).slice(-3).map(h=>h.k);
  const pool = ['A','B','C','H'];
  const filtered = (last3.length===3 && last3[0]===last3[1] && last3[1]===last3[2]) ? pool.filter(k=>k!==last3[0]) : pool;
  return filtered[Math.floor(Math.random()*filtered.length)];
}

async function fetchInternetLocal(query){
  try{
    const url = `https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`;
    const r = await fetch(url);
    if(r.ok){
      const j = await r.json();
      if(j.extract) return j.extract;
    }
  }catch{}
  try{
    const ddg = `https://api.allorigins.win/raw?url=${encodeURIComponent('https://api.duckduckgo.com/?q='+encodeURIComponent(query)+'&format=json&no_html=1&skip_disambig=1')}`;
    const r = await fetch(ddg);
    const j = await r.json();
    if(j.AbstractText) return j.AbstractText;
  }catch{}
  return null;
}

async function askBackend(q){
  const r = await fetch(BACKEND + '/ask', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({q})
  });
  if(!r.ok) throw new Error('Backend error');
  return await r.json();
}

async function handleAsk(){
  const q = input.value.trim();
  if(!q) return;
  input.value = '';
  setSpeaker('I');
  textEl.textContent = 'Thinking…';
  
  try {
    if (BACKEND) {
      statusEl.textContent = 'RAILWAY MODE';
      const res = await askBackend(q);
      setSpeaker(res.speaker);
      textEl.textContent = res.answer;
    } else {
      statusEl.textContent = 'LOCAL MODE';
      const result = await fetchInternetLocal(q);
      const speaker = chooseSpeakerLocal(q);
      setSpeaker(speaker);
      const out = result ? result.slice(0,900) : 'No internet result. Center holds. Ask about contain, modulate, emerge, or honey badger.';
      textEl.textContent = out;
      saveLocal(q, out, speaker);
    }
  } catch(e) {
    setSpeaker('M');
    textEl.textContent = 'Error: ' + e.message + '. Check backend URL or use local mode.';
  }
}

sendBtn.onclick = handleAsk;
input.onkeydown = e => { if(e.key==='Enter') handleAsk(); };
dot.onclick = ()=>{ setSpeaker('M'); textEl.textContent = 'Center is still. I speak only as a response. Set aeon_backend_url in localStorage to connect Railway.'; };

if(BACKEND) {
  statusEl.textContent = 'RAILWAY MODE';
  fetch(BACKEND + '/health').catch(()=>{statusEl.textContent = 'RAILWAY OFFLINE';});
}
setSpeaker('M');
</script>
</body>
</html>
