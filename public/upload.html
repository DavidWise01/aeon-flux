<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>0root.ai — KB Upload</title>
<style>
:root{--bg:#020308;--ink:#d8e8e0;--gold:#ffd95a;--mag:#e168ff;--cyan:#32e8ff;--mint:#00ffaa;--red:#dc2626;--panel:rgba(0,0,0,.6);--border:rgba(0,255,170,.18)}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:#000;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
body{background:radial-gradient(circle at 50% 42%,rgba(0,255,170,.06),transparent 28%),linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px),var(--bg);background-size:100% 100%,30px 30px,30px 30px;padding:24px}
.panel{border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(8px);border-radius:14px;padding:20px;margin-bottom:16px}
h1{margin:0 0 4px;font-size:15px;letter-spacing:.14em;color:var(--mint);font-weight:400}
h2{margin:0 0 14px;font-size:12px;letter-spacing:.12em;color:#7aa89a;font-weight:400;text-transform:uppercase}
a{color:var(--cyan);text-decoration:none}
a:hover{text-decoration:underline}

/* ── Drop zone ── */
#dropzone{
  border:2px dashed var(--border);border-radius:10px;padding:40px 20px;
  text-align:center;cursor:pointer;transition:border-color .2s,background .2s;
  color:#5a7a6f;font-size:13px;line-height:1.8
}
#dropzone.over{border-color:var(--mint);background:rgba(0,255,170,.05);color:var(--mint)}
#dropzone input[type=file]{display:none}
#dropzone .icon{font-size:36px;margin-bottom:8px}

/* ── Buttons ── */
button{background:transparent;border:1px solid var(--border);color:var(--ink);padding:9px 18px;border-radius:8px;cursor:pointer;font:inherit;text-transform:uppercase;font-size:11px;letter-spacing:.08em;transition:box-shadow .2s,color .2s}
button:hover{box-shadow:0 0 14px rgba(0,255,170,.25);color:var(--mint)}
button:disabled{opacity:.4;cursor:not-allowed}
.btn-row{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}

/* ── Queue ── */
#queue{margin-top:14px}
.q-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border:1px solid var(--border);border-radius:8px;margin-bottom:6px;font-size:12px}
.q-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.q-item .size{color:#5a7a6f;white-space:nowrap}
.q-item .status{white-space:nowrap;min-width:70px;text-align:right}
.status-pending{color:#7aa89a}
.status-ok{color:var(--mint)}
.status-err{color:var(--red)}

/* ── File list ── */
#filelist{font-size:12px}
.fl-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border)}
.fl-item:last-child{border-bottom:none}
.fl-item .fname{flex:1;color:var(--ink)}
.fl-item .fsize{color:#5a7a6f;white-space:nowrap}
.fl-item .fdate{color:#5a7a6f;white-space:nowrap;font-size:11px}
.empty{color:#5a7a6f;font-size:12px;padding:12px 0}

/* ── Toast ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:320px}
#toast.show{opacity:1}
#toast.ok{border-color:var(--mint);color:var(--mint)}
#toast.err{border-color:var(--red);color:var(--red)}
</style>
</head>
<body>

<div class="panel" style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
  <h1>KB UPLOAD · /mnt/data/kb</h1>
  <div style="margin-left:auto;font-size:11px">
    <a href="/">← Back to Engine</a>
  </div>
</div>

<!-- Upload panel -->
<div class="panel">
  <h2>Upload Files</h2>
  <div id="dropzone">
    <div class="icon">📂</div>
    <div>Drag &amp; drop files here, or <strong style="color:var(--cyan)">click to browse</strong></div>
    <div style="font-size:11px;margin-top:6px;color:#3a5a50">Files are saved to <code style="color:var(--gold)">/mnt/data/kb</code> with their original names</div>
    <input type="file" id="fileInput" multiple>
  </div>

  <div id="queue"></div>

  <div class="btn-row">
    <button id="uploadBtn" disabled>UPLOAD ALL</button>
    <button id="clearBtn" disabled>CLEAR QUEUE</button>
  </div>
</div>

<!-- Stored files panel -->
<div class="panel">
  <h2 style="display:flex;align-items:center;gap:10px">
    Stored Files
    <button id="refreshBtn" style="padding:4px 10px;font-size:10px">REFRESH</button>
  </h2>
  <div id="filelist"><div class="empty">Loading…</div></div>
</div>

<div id="toast"></div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let queue = []; // { file, status: 'pending'|'ok'|'err' }

// ── DOM refs ──────────────────────────────────────────────────────────────────
const dropzone  = document.getElementById('dropzone');
const fileInput = document.getElementById('fileInput');
const queueEl   = document.getElementById('queue');
const uploadBtn = document.getElementById('uploadBtn');
const clearBtn  = document.getElementById('clearBtn');
const refreshBtn= document.getElementById('refreshBtn');
const filelistEl= document.getElementById('filelist');
const toastEl   = document.getElementById('toast');

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'ok') {
  toastEl.textContent = msg;
  toastEl.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { toastEl.className = ''; }, 3500);
}

// ── Drop zone ─────────────────────────────────────────────────────────────────
dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('over');
  addFiles([...e.dataTransfer.files]);
});
fileInput.addEventListener('change', () => {
  addFiles([...fileInput.files]);
  fileInput.value = '';
});

// ── Queue management ──────────────────────────────────────────────────────────
function fmt(bytes) {
  if (bytes < 1024) return `${bytes} B`;
  if (bytes < 1048576) return `${(bytes/1024).toFixed(1)} KB`;
  return `${(bytes/1048576).toFixed(1)} MB`;
}

function addFiles(files) {
  files.forEach(f => {
    if (!queue.find(q => q.file.name === f.name && q.file.size === f.size)) {
      queue.push({ file: f, status: 'pending' });
    }
  });
  renderQueue();
}

function renderQueue() {
  queueEl.innerHTML = '';
  queue.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'q-item';
    const statusClass = `status-${item.status}`;
    const statusLabel = item.status === 'pending' ? 'QUEUED' : item.status === 'ok' ? '✓ SAVED' : '✗ ERROR';
    div.innerHTML = `
      <span class="name" title="${item.file.name}">${item.file.name}</span>
      <span class="size">${fmt(item.file.size)}</span>
      <span class="status ${statusClass}">${statusLabel}</span>
    `;
    queueEl.appendChild(div);
  });
  const hasPending = queue.some(q => q.status === 'pending');
  uploadBtn.disabled = !hasPending;
  clearBtn.disabled  = queue.length === 0;
}

clearBtn.addEventListener('click', () => {
  queue = [];
  renderQueue();
});

// ── Upload ────────────────────────────────────────────────────────────────────
uploadBtn.addEventListener('click', async () => {
  const pending = queue.filter(q => q.status === 'pending');
  if (!pending.length) return;

  uploadBtn.disabled = true;

  const fd = new FormData();
  pending.forEach(item => fd.append('files', item.file));

  try {
    const res = await fetch('/upload', { method: 'POST', body: fd });
    const json = await res.json();
    if (res.ok && json.ok) {
      pending.forEach(item => { item.status = 'ok'; });
      toast(`✓ ${pending.length} file${pending.length > 1 ? 's' : ''} saved to /mnt/data/kb`, 'ok');
      loadFiles();
    } else {
      pending.forEach(item => { item.status = 'err'; });
      toast(`Upload failed: ${json.error || res.statusText}`, 'err');
    }
  } catch (err) {
    pending.forEach(item => { item.status = 'err'; });
    toast(`Network error: ${err.message}`, 'err');
  }

  renderQueue();
});

// ── File list ─────────────────────────────────────────────────────────────────
async function loadFiles() {
  filelistEl.innerHTML = '<div class="empty">Loading…</div>';
  try {
    const res  = await fetch('/files');
    const json = await res.json();
    if (!res.ok) throw new Error(json.error || res.statusText);

    const files = json.files || [];
    if (files.length === 0) {
      filelistEl.innerHTML = '<div class="empty">No files stored yet.</div>';
      return;
    }

    filelistEl.innerHTML = '';
    files
      .slice()
      .sort((a, b) => new Date(b.modified) - new Date(a.modified))
      .forEach(f => {
        const div = document.createElement('div');
        div.className = 'fl-item';
        const date = new Date(f.modified).toLocaleString();
        div.innerHTML = `
          <span class="fname">${f.name}</span>
          <span class="fsize">${fmt(f.size)}</span>
          <span class="fdate">${date}</span>
        `;
        filelistEl.appendChild(div);
      });
  } catch (err) {
    filelistEl.innerHTML = `<div class="empty" style="color:var(--red)">Error: ${err.message}</div>`;
  }
}

refreshBtn.addEventListener('click', loadFiles);

// ── Init ──────────────────────────────────────────────────────────────────────
loadFiles();
</script>
</body>
</html>
