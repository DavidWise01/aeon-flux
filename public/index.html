<!DOCTYPE html><html><head><meta charset="utf-8"><title>AEON // L2</title>
<style>body{margin:0;background:#050507;color:#ddd;font-family:monospace} .wrap{padding:20px;max-width:1200px;margin:auto}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px} .panel{background:#0b0b12;border:1px solid #222;padding:14px}
h3{margin:0 0 8px;font-weight:400;color:#888;letter-spacing:.1em} button{background:#111;border:1px solid #333;color:#eee;padding:8px 12px;margin:4px;cursor:pointer}
.tri{width:100%;aspect-ratio:1} .log{font-size:11px;color:#999;max-height:200px;overflow:auto}</style>
</head><body><div class="wrap">
<h2>AEON // level 2 — triangulation live</h2>
<div class="grid">
<div class="panel"><h3>AEON (you act)</h3><svg class="tri" viewBox="0 0 200 200"><polygon points="100,10 10,180 190,180" fill="none" stroke="#333"/><circle id="dot" r="5" fill="#00ffd0" cx="100" cy="120"/></svg>
<div><button id="l">disrupt</button><button id="r">stabilize</button><button id="ref">reflect</button></div>
<div id="aeon-state"></div></div>

<div class="panel"><h3>TREVOR (constraint)</h3><div id="trevor-state"></div><div class="log" id="trevor-log"></div></div>

<div class="panel"><h3>OBSERVER (you watch)</h3><div id="obs-state"></div><div class="log" id="obs-log"></div></div>
</div></div>
<script type="module">
import { aeon } from '../src/aeon/index.js';
import { toCartesian } from '../src/core/triangulation.js';
const dot=document.getElementById('dot');
function upd(r){
 const c=toCartesian(r.position); dot.setAttribute('cx',100+(c.x-100)*0.9); dot.setAttribute('cy',10+c.y*0.9);
 document.getElementById('aeon-state').innerHTML=`pos e${r.position.e.toFixed(2)} p${r.position.p.toFixed(2)} l${r.position.l.toFixed(2)}<br>Δ ${r.delta.magnitude.toFixed(3)}<br>${r.soulState}`;
 document.getElementById('trevor-state').innerHTML=`intent: ${r.trevor.intent}<br>push l:${r.trevor.vector.dl.toFixed(3)}<br><i>${r.trevor.message}</i>`;
 document.getElementById('obs-state').innerHTML=`awareness ${(r.observer.awareness*100).toFixed(0)}%<br>pattern: ${r.observer.pattern}<br><i>${r.observer.insight}</i>`;
 document.getElementById('trevor-log').innerHTML = `<div>${new Date().toLocaleTimeString()} — ${r.trevor.message}</div>` + document.getElementById('trevor-log').innerHTML;
 document.getElementById('obs-log').innerHTML = `<div>${r.observer.insight}</div>` + document.getElementById('obs-log').innerHTML;
}
document.getElementById('l').onclick=()=>upd(aeon.act('disrupt'));
document.getElementById('r').onclick=()=>upd(aeon.act('stabilize'));
document.getElementById('ref').onclick=()=>upd(aeon.reflect());
upd(aeon.act('reflect'));
</script></body></html>
