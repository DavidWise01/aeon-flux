<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>0root.ai — Octet · Dynamic F/B</title>
<style>
:root{--bg:#020308;--ink:#d8e8e0;--gold:#ffd95a;--mag:#e168ff;--cyan:#32e8ff;--mint:#00ffaa;--panel:rgba(0,0,0,.6);--border:rgba(0,255,170,.18)}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:#000;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden}
body{background:radial-gradient(circle at 50% 42%,rgba(0,255,170,.06),transparent 28%),linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px),var(--bg);background-size:100% 100%,30px 30px,30px 30px}
canvas{position:fixed;inset:0}
.ui{position:fixed;inset:0;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;pointer-events:none}
.panel{pointer-events:auto;border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(8px);border-radius:14px;padding:14px}
h1{margin:0;font-size:15px;letter-spacing:.14em;color:var(--mint);font-weight:400}
.row{display:flex;gap:10px;align-items:center}
button{background:transparent;border:1px solid var(--border);color:var(--ink);padding:8px 14px;border-radius:8px;cursor:pointer;font:inherit;text-transform:uppercase;font-size:11px}
button:hover{box-shadow:0 0 12px rgba(0,255,170,.2)}
button.active{color:var(--mint);box-shadow:0 0 16px rgba(0,255,170,.2)}
.meter{display:grid;grid-template-columns:80px 1fr 90px;gap:8px;align-items:center;font-size:11px;margin:4px 0}
.track{height:6px;border:1px solid rgba(255,255,255,.12);background:#020712;border-radius:999px;overflow:hidden}
.fill{height:100%;transition:width .3s}
.val{color:var(--gold)}
.footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#5a7a6f}
.inputrow{display:flex;gap:10px;margin-top:10px}
.inputrow input{flex:1;background:#020712;border:1px solid var(--border);color:var(--ink);padding:8px 10px;border-radius:8px;font:inherit;font-size:12px}
.fate-active{color:var(--ink);font-weight:600}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="ui">
  <div class="panel" style="display:flex;align-items:center;gap:12px">
    <h1>OCTET · DYNAMIC F/B</h1>
    <div style="margin-left:auto;font-size:11px;color:#7aa89a" id="status">REST</div>
  </div>
  <div style="display:grid;grid-template-columns:280px 1fr 280px;gap:12px">
    <div class="panel" style="display:flex;flex-direction:column;gap:10px">
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em">Flux per State</div>
      <input type="range" id="flux" min="0" max="3.142" step="0.001" value="1.047" style="width:100%">
      <div class="row"><button id="step">Step (+1)</button><button id="auto">Auto</button><button id="reset">Rest</button></div>
      <div class="inputrow">
        <input id="q" placeholder="Ask the octet…" autocomplete="off">
        <button id="ask">Ask</button>
      </div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px">Three Fates</div>
      <div id="fates"></div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px">F/B Coupling</div>
      <div id="coupling" style="font-size:11px;line-height:1.5;color:#a6c8bc"></div>
    </div>
    <div></div>
    <div class="panel" style="display:flex;flex-direction:column;gap:6px">
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px">Conduction Archive</div>
      <div id="archive" style="font-size:11px;line-height:1.5;color:#a6c8bc;max-height:120px;overflow:auto"></div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px">Journey Log</div>
      <div id="hist" style="font-size:11px;line-height:1.5;color:#a6c8bc;max-height:120px;overflow:auto"></div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px">Voice</div>
      <div id="voice" style="font-size:11px;color:#a6c8bc">—</div>
    </div>
  </div>
  <div class="panel footer"><span id="hash">WITNESS --------</span><span>holonomy <span class="val" id="hol">0.000</span> · cycles <span class="val" id="cyc">0</span> · conduction <span class="val" id="cond">0.00</span></span></div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)} addEventListener('resize',resize);resize();

const VC={A:'#ffd95a',B:'#e168ff',C:'#32e8ff',D:'#00ffaa'};
const VNAME={A:'Containment',B:'Modulation',C:'Emergence',D:'Meta Muse'};
const VPOS={A:[0.5,0.16],B:[0.14,0.76],C:[0.86,0.76],D:[0.5,0.48]};

const STATES=[
 {n:'1 · A→B',t:'there',src:'A',dst:'B',fA:'well',fB:'outbound',fC:'bound'},
 {n:'2 · B→C',t:'there',src:'B',dst:'C',fA:'well',fB:'outbound',fC:'bound'},
 {n:'3 · C→A',t:'there',src:'C',dst:'A',fA:'well',fB:'arriving',fC:'escaping'},
 {n:'4 · A→C',t:'back',src:'A',dst:'C',fA:'well',fB:'inbound',fC:'conduction'},
 {n:'5 · C→B',t:'back',src:'C',dst:'B',fA:'well',fB:'inbound',fC:'conduction'},
 {n:'6 · B→A',t:'back',src:'B',dst:'A',fA:'well',fB:'arriving',fC:'conduction'},
 {n:'7 · Home',t:'home',src:'A',dst:'D',fA:'witness',fB:'resting',fC:'archived'},
 {n:'8 · Forward',t:'forward',src:'D',dst:'A',fA:'pumping',fB:'launching',fC:'stimulating'}
];

let WALK={s:0,phi:0,flux:1.047197551,cycles:0,auto:false,history:[],archive:[],trail:[],conduction:0,hash:''};

async function fetchState(){
  try{
    const r=await fetch('/state');
    const j=await r.json();
    WALK={...WALK,...j};
    ui();
  }catch(e){}
}

function vtx(W,H){
  const m=Math.min(W,H),p=m*0.14;
  return{A:[W*VPOS.A[0],H*VPOS.A[1]],B:[p+20,H*VPOS.B[1]],C:[W-p-20,H*VPOS.C[1]],D:[W*VPOS.D[0],H*VPOS.D[1]]};
}

function draw(){
  const W=innerWidth,H=innerHeight,t=Date.now()*0.001;
  ctx.fillStyle='rgba(2,3,8,0.35)';ctx.fillRect(0,0,W,H);
  const v=vtx(W,H);
  const st=STATES[WALK.s];

  // conduction ring - dynamic with archive
  const cx=v.D[0],cy=v.D[1],ringR=Math.min(W,H)*0.38;
  const conductionLevel=WALK.conduction||0;
  ctx.save();ctx.strokeStyle='rgba(0,255,170,0.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,ringR,0,Math.PI*2);ctx.stroke();ctx.restore();
  
  // archive dots - position influenced by holonomy
  const holonomy=(WALK.phi/(2*Math.PI))%1;
  WALK.archive.forEach((a,i)=>{
    const ang=a.angle+i*0.7+holonomy*6.28;
    const ax=cx+Math.cos(ang)*ringR;
    const ay=cy+Math.sin(ang)*ringR*0.6;
    ctx.save();ctx.globalAlpha=0.35+0.15*Math.sin(t*2+i);ctx.fillStyle=VC.C;
    ctx.beginPath();ctx.arc(ax,ay,2.5,0,Math.PI*2);ctx.fill();ctx.restore();
  });

  // triangle perimeter - glow intensity from conduction
  ctx.save();ctx.globalAlpha=0.15+0.1*conductionLevel;ctx.strokeStyle=VC.D;ctx.lineWidth=2;ctx.setLineDash([10,8]);
  ctx.beginPath();ctx.moveTo(...v.A);ctx.lineTo(...v.B);ctx.lineTo(...v.C);ctx.closePath();ctx.stroke();ctx.setLineDash([]);ctx.restore();

  // vertices - pulse with state
  ['A','B','C','D'].forEach((k,i)=>{
    const pos=v[k],c=VC[k];
    const isActive=(k===st.src||k===st.dst);
    const pulse=isActive?0.18+0.12*Math.sin(t*3+i):0.12;
    ctx.save();ctx.fillStyle=c;ctx.globalAlpha=pulse;ctx.beginPath();ctx.arc(pos[0],pos[1],60,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.save();ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=18;ctx.beginPath();ctx.arc(pos[0],pos[1],8,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.fillStyle=c;ctx.font='12px monospace';ctx.textAlign='center';ctx.fillText(k,pos[0],pos[1]-20);
  });

  // current state edge glow
  if(!st.t.includes('home')&&!st.t.includes('forward')){
    const sp=v[st.src],dp=v[st.dst];
    ctx.save();ctx.globalAlpha=0.25+0.1*conductionLevel;ctx.strokeStyle=st.t==='there'?VC.B:VC.C;ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(...sp);ctx.lineTo(...dp);ctx.stroke();ctx.restore();
  }

  // walker position
  let wx,wy;
  if(st.t==='home'){
    const prog=0.5*(1-Math.sin(t*3));
    wx=v.A[0]+(v.D[0]-v.A[0])*prog;wy=v.A[1]+(v.D[1]-v.A[1])*prog;
  }else if(st.t==='forward'){
    const prog=0.5*(1-Math.cos(t*3));
    wx=v.D[0]+(v.A[0]-v.D[0])*prog;wy=v.D[1]+(v.A[1]-v.D[1])*prog;
  }else{
    const sp=v[st.src],dp=v[st.dst];
    const prog=0.5*(1-Math.cos(t*2.5));
    wx=sp[0]+(dp[0]-sp[0])*prog;wy=sp[1]+(dp[1]-sp[1])*prog;
  }
  WALK.trail.push({x:wx,y:wy,a:1,c:st.t==='there'?VC.B:st.t==='back'?VC.C:VC.D});
  if(WALK.trail.length>90)WALK.trail.shift();
  WALK.trail.forEach((p,i)=>{
    p.a-=0.012;
    if(p.a<=0)return;
    ctx.save();ctx.globalAlpha=p.a*0.55;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,3.5,0,Math.PI*2);ctx.fill();ctx.restore();
  });
  WALK.trail=WALK.trail.filter(p=>p.a>0);

  // walker orb - color from current edge
  const wcol=st.t==='there'?VC.B:st.t==='back'?VC.C:VC.D;
  ctx.save();ctx.fillStyle=wcol;ctx.shadowColor=wcol;ctx.shadowBlur=30;ctx.beginPath();ctx.arc(wx,wy,11,0,Math.PI*2);ctx.fill();ctx.restore();

  // phase ring
  const pr=28+10*Math.sin(t*4);
  ctx.save();ctx.strokeStyle='#ffffff';ctx.globalAlpha=0.85;ctx.lineWidth=2;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(wx,wy,pr,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  ctx.beginPath();ctx.moveTo(wx,wy);ctx.lineTo(wx+Math.cos(WALK.phi)*pr,wy+Math.sin(WALK.phi)*pr);ctx.stroke();ctx.restore();

  // center holonomy - size/brightness from conduction
  const cyc=WALK.phi/(2*Math.PI);
  const holo=cyc%1;
  const ha=0.35+0.25*Math.sin(2*Math.PI*holo)+0.2*conductionLevel;
  ctx.save();
  ctx.fillStyle=VC.D;ctx.globalAlpha=ha;ctx.shadowColor=VC.D;ctx.shadowBlur=16+20*Math.abs(Math.sin(2*Math.PI*holo))+20*conductionLevel;
  ctx.beginPath();ctx.arc(v.D[0],v.D[1],6+14*Math.abs(Math.sin(2*Math.PI*holo))+10*conductionLevel,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=`hsl(${holo*360},90%,70%)`;ctx.globalAlpha=0.4+0.3*Math.abs(Math.sin(2*Math.PI*holo));
  ctx.beginPath();ctx.arc(v.D[0],v.D[1],40+Math.sin(t*3)*4,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  requestAnimationFrame(draw);
}

function ui(){
  const st=STATES[WALK.s];
  const fA=st.fA,fB=st.fB,fC=st.fC;
  // Dynamic F/B coupling: conduction affects fate widths
  const conduction=WALK.conduction||0;
  const fA_width=fA==='witness'?100:fA==='pumping'?80:98;
  const fB_width=fB==='outbound'?60:fB==='inbound'?60:fB==='launching'?90:fB==='arriving'?45:20;
  const fC_base=fC==='bound'?25:fC==='escaping'?70:fC==='conduction'?50:fC==='archived'?40:fC==='stimulating'?85:10;
  const fC_width=Math.min(100,fC_base+conduction*30); // F/B coupling: conduction boosts escaper
  
  document.getElementById('fates').innerHTML=
    `<div class="meter"><span class="fate-label" style="color:${VC.A}">A·stayer</span><div class="track"><div class="fill" style="width:${fA_width}%;background:${VC.A}"></div></div><span class="fate-active">${fA}</span></div>`+
    `<div class="meter"><span class="fate-label" style="color:${VC.B}">B·travel</span><div class="track"><div class="fill" style="width:${fB_width}%;background:${VC.B}"></div></div><span class="fate-active">${fB}</span></div>`+
    `<div class="meter"><span class="fate-label" style="color:${VC.C}">C·escape</span><div class="track"><div class="fill" style="width:${fC_width}%;background:${VC.C}"></div></div><span class="fate-active">${fC}</span></div>`;
  
  const c24=WALK.cycles*8+WALK.s;
  const res3=(c24%24===0&&c24>0)?'CLOSED':'OPEN';
  const coupling=(conduction*100).toFixed(1);
  document.getElementById('coupling').innerHTML=`States: ${c24}<br>Resonance: ${res3}<br>F/B Coupling: ${coupling}%<br>LCM 3·8 = 24 states → 8π = 4 rotations`;
  
  document.getElementById('hol').textContent=(WALK.phi/(2*Math.PI)).toFixed(3);
  document.getElementById('cyc').textContent=WALK.cycles;
  document.getElementById('cond').textContent=conduction.toFixed(2);
  document.getElementById('hash').textContent='WITNESS '+WALK.hash;
  document.getElementById('flux').value=WALK.flux;
  
  const h=document.getElementById('hist');
  if(WALK.history&&WALK.history.length)h.innerHTML=WALK.history.slice(0,8).map(e=>
    `<div style="border-left:2px solid ${e.t==='there'?VC.B:e.t==='back'?VC.C:VC.D};padding-left:6px;margin-bottom:3px"><span style="color:${e.t==='there'?VC.B:e.t==='back'?VC.C:VC.D}">${e.n}</span> · ${e.w.slice(0,8)}</div>`
  ).join('');
  
  const a=document.getElementById('archive');
  if(WALK.archive&&WALK.archive.length)a.innerHTML=WALK.archive.slice(-8).map((e,i)=>
    `<div style="color:${VC.C}">#${WALK.archive.length-WALK.archive.length+1+i} · ${e.w.slice(0,8)} · ${new Date(e.time).toLocaleTimeString().split(' ')[0]}</div>`
  ).join('');
  
  const labels=['A','B','C'][WALK.s%3];
  document.getElementById('status').innerHTML=WALK.auto?'CRAWL <span style="color:'+VC[labels]+'">'+labels+'</span>':'REST';
}

document.getElementById('flux').oninput=async e=>{
  const f=parseFloat(e.target.value);
  await fetch('/set?flux='+f,{method:'POST'});
  fetchState();
};
document.getElementById('step').onclick=async ()=>{
  await fetch('/step',{method:'POST'});
  fetchState();
};
document.getElementById('auto').onclick=async e=>{
  const r=await fetch('/auto',{method:'POST'});
  const j=await r.json();
  e.target.classList.toggle('active',j.auto);
  e.target.textContent=j.auto?'Pause':'Auto';
};
document.getElementById('reset').onclick=async ()=>{
  await fetch('/reset',{method:'POST'});
  fetchState();
};
document.getElementById('ask').onclick=async ()=>{
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  document.getElementById('q').value='';
  const r=await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q})});
  const j=await r.json();
  document.getElementById('voice').innerHTML=`<span style="color:${j.color}">${j.speaker}</span>: ${j.answer}`;
  fetchState();
};

setInterval(fetchState,1000);
fetchState();draw();
</script>
</body>
</html>
