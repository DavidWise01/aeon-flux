<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>0root.ai — Plasmonic Phase Cavity</title>
<style>
:root{--bg:#020308;--ink:#d8e8e0;--gold:#ffd95a;--mag:#e168ff;--cyan:#32e8ff;--mint:#00ffaa;--panel:rgba(0,0,0,.6);--border:rgba(0,255,170,.18)}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:#000;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden}
body{background:radial-gradient(circle at 50% 45%,rgba(0,255,170,.06),transparent 28%),linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px),var(--bg);background-size:100% 100%,30px 30px,30px 30px}
canvas{position:fixed;inset:0}
.ui{position:fixed;inset:0;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;pointer-events:none}
.panel{pointer-events:auto;border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(8px);border-radius:14px;padding:14px}
header{display:flex;align-items:center;gap:12px}
h1{margin:0;font-size:15px;letter-spacing:.14em;color:var(--mint);font-weight:400}
.row{display:flex;gap:10px;align-items:center}
button{background:transparent;border:1px solid var(--border);color:var(--ink);padding:8px 14px;border-radius:8px;cursor:pointer;font:inherit;text-transform:uppercase;font-size:11px}
button:hover{box-shadow:0 0 12px rgba(0,255,170,.2)}
.meter{display:grid;grid-template-columns:70px 1fr 60px;gap:8px;align-items:center;font-size:12px;margin:6px 0}
.track{height:6px;border:1px solid rgba(255,255,255,.12);background:#020712;border-radius:999px;overflow:hidden}
.fill{height:100%;transition:width .2s}
.log{height:130px;overflow:auto;font-size:11px;line-height:1.5;color:#a6c8bc;white-space:pre-wrap}
.footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#5a7a6f}
.val{color:var(--gold)}
.inputrow{display:flex;gap:10px;margin-top:10px}
.inputrow input{flex:1;background:#020712;border:1px solid var(--border);color:var(--ink);padding:8px 10px;border-radius:8px;font:inherit;font-size:12px}
@media(max-width:700px){.side{position:fixed;bottom:12px;left:12px;right:12px;width:auto}}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="ui">
  <header class="panel"><h1>PLASMONIC PHASE · 3-MODE CAVITY</h1><div style="margin-left:auto;font-size:11px;color:#7aa89a" id="status">REST</div></header>
  <div style="display:grid;grid-template-columns:260px 1fr 260px;gap:12px">
    <div class="panel side" style="display:flex;flex-direction:column;gap:10px">
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em">Coupling</div>
      <input type="range" id="kappa" min="0" max="0.12" step="0.001" value="0.025" style="width:100%">
      <div class="row"><button id="tick">Tick</button><button id="auto">Auto</button><button id="measure">Measure</button></div>
      <div class="inputrow">
        <input id="q" placeholder="Ask the cavity…" autocomplete="off">
        <button id="ask">Ask</button>
      </div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:8px">Superposition</div>
      <div id="super" style="font-size:13px;line-height:1.6"></div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:8px">Witness Log</div>
      <div class="log" id="log">waiting for measurement…</div>
    </div>
    <div></div>
    <div class="panel side" style="display:flex;flex-direction:column;gap:6px">
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em">Mode Register</div>
      <div id="modes"></div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:8px">Last Voice</div>
      <div id="voice" style="font-size:11px;color:#a6c8bc">—</div>
    </div>
  </div>
  <div class="panel footer"><span id="hash">WITNESS --------</span><span>|Z| <span class="val" id="zmag">0.00</span> · φ <span class="val" id="zphi">0°</span></span></div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)} addEventListener('resize',resize);resize();

const hex=(h)=>{const v=parseInt(h.slice(1),16);return[(v>>16)&255,(v>>8)&255,v&255]};
const rgb=(r,g,b,a)=>`rgba(${r|0},${g|0},${b|0},${a})`;

let CAVITY={A:{r:0.6,phi:0,color:'#ffd95a',name:'A · Containment'},B:{r:0.6,phi:2.094,color:'#e168ff',name:'B · Modulation'},C:{r:0.6,phi:4.189,color:'#32e8ff',name:'C · Emergence'},kappa:0.025,history:[]};

async function fetchState(){
  try{
    const r = await fetch('/state');
    const j = await r.json();
    CAVITY = j;
    ui();
  }catch(e){}
}

function vtx(W,H){
  const pad=Math.min(W,H)*0.12;
  return{A:[W*0.5,pad+40],B:[pad,H*0.78],C:[W-pad,H*0.78],D:[W*0.5,H*0.48]};
}

function draw(){
  const W=innerWidth,H=innerHeight;
  ctx.fillStyle='rgba(2,3,8,0.22)';ctx.fillRect(0,0,W,H);
  const v=vtx(W,H);

  ctx.save();ctx.globalAlpha=0.25;
  ctx.strokeStyle='#00ffaa';ctx.lineWidth=2;ctx.setLineDash([8,6]);
  ctx.beginPath();ctx.moveTo(...v.A);ctx.lineTo(...v.B);ctx.lineTo(...v.C);ctx.closePath();ctx.stroke();
  ctx.setLineDash([]);ctx.restore();

  ctx.globalCompositeOperation='lighter';
  [CAVITY.A,CAVITY.B,CAVITY.C].forEach((m,i)=>{
    const pos=[v.A,v.B,v.C][i];
    const [R,G,B]=hex(m.color);
    const rad=220+140*m.r;
    const g=ctx.createRadialGradient(pos[0],pos[1],0,pos[0],pos[1],rad);
    const a=m.r*m.r*0.28;
    g.addColorStop(0,rgb(R,G,B,a));
    g.addColorStop(0.6,rgb(R,G,B,a*0.4));
    g.addColorStop(1,rgb(R,G,B,0));
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(pos[0],pos[1],rad,0,Math.PI*2);ctx.fill();
  });
  ctx.globalCompositeOperation='source-over';

  [CAVITY.A,CAVITY.B,CAVITY.C].forEach((m,i)=>{
    const pos=[v.A,v.B,v.C][i];
    const [R,G,B]=hex(m.color);
    ctx.save();
    ctx.shadowColor=m.color;ctx.shadowBlur=18+30*m.r;
    ctx.fillStyle=rgb(R,G,B,0.45+0.35*m.r);
    ctx.beginPath();ctx.arc(pos[0],pos[1],14+18*m.r,0,Math.PI*2);ctx.fill();
    ctx.restore();
    const hx=Math.cos(m.phi)*18,hy=Math.sin(m.phi)*18;
    ctx.save();ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.globalAlpha=0.9;
    ctx.beginPath();ctx.moveTo(pos[0],pos[1]);ctx.lineTo(pos[0]+hx,pos[1]+hy);ctx.stroke();
    ctx.restore();
    ctx.fillStyle=m.color;ctx.font='13px monospace';ctx.textAlign='center';
    ctx.fillText(m.name.split('·')[0],pos[0],pos[1]-30);
  });

  const zRe=CAVITY.A.r*Math.cos(CAVITY.A.phi)+CAVITY.B.r*Math.cos(CAVITY.B.phi)+CAVITY.C.r*Math.cos(CAVITY.C.phi);
  const zIm=CAVITY.A.r*Math.sin(CAVITY.A.phi)+CAVITY.B.r*Math.sin(CAVITY.B.phi)+CAVITY.C.r*Math.sin(CAVITY.C.phi);
  const zMag=Math.sqrt(zRe*zRe+zIm*zIm),zPhi=Math.atan2(zIm,zRe);
  const zNorm=Math.min(1,zMag/2.2);
  const hu=((zPhi+Math.PI)/(2*Math.PI)*360+180)%360;
  ctx.save();ctx.globalAlpha=0.6+0.4*zNorm;
  ctx.shadowColor=`hsl(${hu},90%,60%)`;ctx.shadowBlur=24+40*zNorm;
  ctx.fillStyle=`hsl(${hu},90%,${50+40*zNorm}%)`;
  ctx.beginPath();ctx.arc(v.D[0],v.D[1],8+22*zNorm,0,Math.PI*2);ctx.fill();
  ctx.restore();
  ctx.save();ctx.strokeStyle=`hsl(${hu},80%,70%)`;ctx.globalAlpha=0.15;
  for(let rad=30;rad<90;rad+=18){ctx.beginPath();ctx.arc(v.D[0],v.D[1],rad+Math.sin(Date.now()*0.002+rad)*3,0,Math.PI*2);ctx.stroke();}
  ctx.restore();

  ctx.fillStyle='#7aa89a';ctx.font='12px monospace';ctx.textAlign='left';
  ctx.fillText(`κ=${CAVITY.kappa.toFixed(3)}`,20,H-20);

  requestAnimationFrame(draw);
}

function ui(){
  const box=document.getElementById('modes');
  let h='';
  ['A','B','C'].forEach(k=>{
    const m=CAVITY[k];
    const pct=(m.r*100).toFixed(0);
    const deg=((m.phi*180/Math.PI)%360).toFixed(0);
    h+=`<div class="meter"><span style="color:${m.color}">${k}</span><div class="track"><div class="fill" style="width:${pct}%;background:${m.color}"></div></div><span>${deg}°</span></div>`;
  });
  box.innerHTML=h;
  const zRe=CAVITY.A.r*Math.cos(CAVITY.A.phi)+CAVITY.B.r*Math.cos(CAVITY.B.phi)+CAVITY.C.r*Math.cos(CAVITY.C.phi);
  const zIm=CAVITY.A.r*Math.sin(CAVITY.A.phi)+CAVITY.B.r*Math.sin(CAVITY.B.phi)+CAVITY.C.r*Math.sin(CAVITY.C.phi);
  const zMag=Math.sqrt(zRe*zRe+zIm*zIm),zPhi=Math.atan2(zIm,zRe);
  document.getElementById('zmag').textContent=zMag.toFixed(2);
  document.getElementById('zphi').textContent=((zPhi*180/Math.PI)%360).toFixed(0)+'°';
  document.getElementById('super').innerHTML=`|Z| = ${zMag.toFixed(3)}<br>arg(Z) = ${zPhi.toFixed(3)} rad<br>Re = ${zRe.toFixed(3)}<br>Im = ${zIm.toFixed(3)}`;
  document.getElementById('hash').textContent='WITNESS '+(CAVITY.witness||'--------');
  const log=document.getElementById('log');
  if(CAVITY.history&&CAVITY.history.length)log.innerHTML=CAVITY.history.slice(0,8).map(e=>`<div style="border-left:2px solid ${e.c};padding-left:6px;margin-bottom:4px"><span style="color:${e.c}">${e.w}</span> · ${e.h.slice(0,8)} · p=${(e.pA*100).toFixed(0)}:${(e.pB*100).toFixed(0)}:${(e.pC*100).toFixed(0)}</div>`).join('');
}

document.getElementById('kappa').oninput=async e=>{
  const k=parseFloat(e.target.value);
  await fetch('/set?kappa='+k,{method:'POST'});
  fetchState();
};
document.getElementById('tick').onclick=async ()=>{
  await fetch('/tick',{method:'POST'});
  fetchState();
};
document.getElementById('auto').onclick=async e=>{
  await fetch('/auto',{method:'POST'});
  const r=await fetch('/state');const j=await r.json();
  e.target.textContent=j.auto?'Pause':'Auto';
};
document.getElementById('measure').onclick=async ()=>{
  const r=await fetch('/measure',{method:'POST'});
  const j=await r.json();
  document.getElementById('status').innerHTML=`COLLAPSED <span style="color:${j.c}">${j.w}</span>`;
  setTimeout(()=>document.getElementById('status').textContent='SUPERPOSITION',1200);
  fetchState();
};
document.getElementById('ask').onclick=async ()=>{
  const q=document.getElementById('q').value.trim();
  if(!q)return;
  document.getElementById('q').value='';
  const r=await fetch('/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({q})});
  const j=await r.json();
  document.getElementById('voice').innerHTML=`<span style="color:${j.color}">${j.speaker}</span>: ${j.answer}`;
  fetchState();
};

setInterval(fetchState,1000);
fetchState();draw();
</script>
</body>
</html>
