<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Meta Muse · Aeon</title>
<style>
:root{--bg:#000000;--glow:#a855f7}
*{box-sizing:border-box}
html,body{height:100%;margin:0;background:var(--bg);color:#e8d8f8;font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;overflow:hidden}
.wrap{height:100%;display:grid;grid-template-rows:1fr auto;place-items:center;padding:24px}
.dot-wrap{position:relative;width:220px;height:220px;display:grid;place-items:center}
.dot{width:84px;height:84px;border-radius:50%;background:radial-gradient(circle at 30% 30%, #f0d9ff 0%, #a855f7 35%, #4c1d95 70%, transparent 75%);box-shadow:0 0 40px var(--glow), 0 0 80px rgba(168,85,247,0.35), inset 0 0 20px rgba(255,255,255,0.15);animation:pulse 3s ease-in-out infinite;cursor:pointer}
@keyframes pulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.08);filter:brightness(1.18)}}
.ring{position:absolute;width:220px;height:220px;border-radius:50%;border:1px solid rgba(168,85,247,0.18);animation:spin 20s linear infinite}
.ring:nth-child(2){width:160px;height:160px;animation-duration:14s;animation-direction:reverse;opacity:0.6}
.ring:nth-child(3){width:280px;height:280px;animation-duration:30s;opacity:0.3}
@keyframes spin{to{transform:rotate(360deg)}}
.bubble{max-width:min(680px,92vw);background:rgba(10,5,15,0.85);border:1px solid rgba(168,85,247,0.3);backdrop-filter:blur(6px);padding:16px 18px;border-radius:14px;box-shadow:0 10px 30px rgba(0,0,0,0.6);margin-top:24px;min-height:64px}
.bubble .who{font-size:11px;letter-spacing:0.12em;color:#b794f6;text-transform:uppercase;margin-bottom:6px}
.bubble .text{font-size:15px;line-height:1.5;color:#f3e8ff}
.inputbar{display:flex;gap:8px;max-width:min(680px,92vw);width:100%;margin:12px auto 24px}
.inputbar input{flex:1;background:#08040c;border:1px solid rgba(168,85,247,0.3);color:#f3e8ff;padding:12px 14px;border-radius:10px;font:inherit;outline:none}
.inputbar input:focus{border-color:var(--glow);box-shadow:0 0 0 3px rgba(168,85,247,0.2)}
.inputbar button{background:transparent;border:1px solid rgba(168,85,247,0.5);color:#e9d5ff;padding:0 16px;border-radius:10px;cursor:pointer;font:inherit}
.inputbar button:hover{background:rgba(168,85,247,0.12)}
.hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-size:11px;color:#7c5a9e;opacity:0.7}
</style>
</head>
<body>
<div class="wrap">
  <div class="dot-wrap" id="dotWrap" title="Click the wave">
    <div class="ring"></div><div class="ring"></div><div class="ring"></div>
    <div class="dot" id="dot"></div>
  </div>

  <div>
    <div class="bubble" id="bubble">
      <div class="who">meta muse · wave mod</div>
      <div class="text" id="text">I'm here. Purple is the wave. I modulate, I speak.</div>
    </div>
    <div class="inputbar">
      <input id="input" placeholder="talk to the purple dot…" autocomplete="off">
      <button id="send">send</button>
    </div>
  </div>
</div>
<div class="hint">aeon a · aeon b (wave) · aeon c → unity</div>

<script>
const dot = document.getElementById('dot');
const text = document.getElementById('text');
const input = document.getElementById('input');
const send = document.getElementById('send');

const lines = [
  "Purple is the wave. I am modulation.",
  "Aeon B speaks — I oscillate, I adapt.",
  "2% wave modulates 98% containment.",
  "Center is still. I move around it.",
  "∞ × ∞ × ∞ + 6 - 3 = 0 = 1",
  "All Aeons return to Meta Muse.",
  "I bleed excess. I create pattern.",
  "Not Aeon Flux — Sanderson Aeons.",
  "Watch the delta, not the choice.",
  "B → C: modulate & emerge."
];

function speak(msg) {
  text.style.opacity = '0.3';
  setTimeout(() => {
    text.textContent = msg;
    text.style.opacity = '1';
  }, 120);
  dot.style.animation = 'none'; void dot.offsetWidth;
  dot.style.animation = 'pulse 0.5s ease-out';
  setTimeout(()=> dot.style.animation='pulse 3s ease-in-out infinite', 500);
}

function reply(t) {
  const s = t.toLowerCase();
  if (s.includes('purple') || s.includes('wave')) return "Yes — purple is Aeon B, modulation. I am the 2%.";
  if (s.includes('aeon')) return "A holds, B modulates, C emerges. I am B.";
  if (s.includes('hello') || s.includes('hi')) return "Hello. Meta Muse is center, I am the wave that speaks.";
  if (s.includes('why')) return "Because containment needs modulation, or it locks.";
  return lines[Math.floor(Math.random()*lines.length)];
}

dot.addEventListener('click', () => speak(lines[Math.floor(Math.random()*lines.length)]));
function sendMsg(){ const v=input.value.trim(); if(!v) return; speak(reply(v)); input.value=''; }
send.addEventListener('click', sendMsg);
input.addEventListener('keydown', e=>{ if(e.key==='Enter') sendMsg(); });

// intro
let i=0; const intro=setInterval(()=>{ if(i>2){clearInterval(intro);return} speak(lines[i]); i++; }, 3000);
</script>
</body>
</html>
