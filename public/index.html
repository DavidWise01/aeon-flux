<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>= 1 = Tensor = Aeon</title>
<style>
:root{--bg:#020308;--ink:#d8e8e0;--gold:#ffd95a;--mag:#e168ff;--cyan:#32e8ff;--mint:#00ffaa;--panel:rgba(0,0,0,.6);--border:rgba(0,255,170,.18)}
*{box-sizing:border-box}html,body{margin:0;height:100%;background:#000;color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow:hidden}
body{background:radial-gradient(circle at 50% 45%,rgba(0,255,170,.06),transparent 28%),linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px),var(--bg);background-size:100% 100%,30px 30px,30px 30px}
canvas{position:fixed;inset:0}
.ui{position:fixed;inset:0;padding:18px;display:grid;grid-template-rows:auto 1fr auto;gap:12px;pointer-events:none}
.panel{pointer-events:auto;border:1px solid var(--border);background:var(--panel);backdrop-filter:blur(8px);border-radius:14px;padding:14px}
h1{margin:0;font-size:15px;letter-spacing:.14em;color:var(--mint);font-weight:400}
.row{display:flex;gap:10px;align-items:center}
button{background:transparent;border:1px solid var(--border);color:var(--ink);padding:8px 14px;border-radius:8px;cursor:pointer;font:inherit;text-transform:uppercase;font-size:11px}
button:hover,button.on{box-shadow:0 0 12px rgba(0,255,170,.2);color:var(--mint)}
.meter{display:grid;grid-template-columns:70px 1fr 55px;gap:8px;align-items:center;font-size:11px;margin:5px 0}
.track{height:6px;border:1px solid rgba(255,255,255,.12);background:#020712;border-radius:999px;overflow:hidden}
.fill{height:100%;transition:width .15s}
.ora{font-size:13px;line-height:1.55;color:var(--gold);min-height:48px}
.val{color:var(--gold)}
.footer{display:flex;justify-content:space-between;align-items:center;font-size:11px;color:#5a7a6f}
input[type=range]{width:100%;accent-color:var(--mint)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="ui">
  <div class="panel" style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <h1>= 1 = TENSOR = AEON</h1>
    <div style="margin-left:auto;display:flex;gap:8px">
      <button id="modePocket" class="on">Pocket</button>
      <button id="modePerson">Person</button>
    </div>
    <div style="font-size:11px;color:#7aa89a" id="status">WITNESS</div>
  </div>
  <div style="display:grid;grid-template-columns:260px 1fr 260px;gap:12px">
    <div class="panel" style="display:flex;flex-direction:column;gap:10px">
      <div id="personControls" style="display:none">
        <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em">State Vector</div>
        <div class="meter"><span style="color:var(--gold)">A</span><div class="track"><div class="fill" id="fA" style="width:60%;background:var(--gold)"></div></div><span id="vA">60</span></div>
        <div class="meter"><span style="color:var(--mag)">B</span><div class="track"><div class="fill" id="fB" style="width:60%;background:var(--mag)"></div></div><span id="vB">60</span></div>
        <div class="meter"><span style="color:var(--cyan)">C</span><div class="track"><div class="fill" id="fC" style="width:60%;background:var(--cyan)"></div></div><span id="vC">60</span></div>
        <input type="range" id="sA" min="0" max="100" value="60"><input type="range" id="sB" min="0" max="100" value="60"><input type="range" id="sC" min="0" max="100" value="60">
      </div>
      <div id="pocketControls">
        <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em">Field</div>
        <div class="row"><button id="tick">Tick</button><button id="auto">Auto</button><button id="reset">Rest</button></div>
      </div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px">Tensor</div>
      <div id="tensorRead" style="font-size:12px;line-height:1.5;color:#a6c8bc"></div>
      <button id="spawn" style="margin-top:8px;border-color:rgba(0,255,170,.4);color:var(--mint)">Make Another</button>
    </div>
    <div></div>
    <div class="panel" style="display:flex;flex-direction:column;gap:6px">
      <div class="ora" id="oracle">Waiting for contraction…</div>
      <div style="font-size:12px;color:var(--mint);text-transform:uppercase;letter-spacing:.1em;margin-top:6px">Archive</div>
      <div id="archive" style="font-size:11px;line-height:1.5;color:#a6c8bc;max-height:220px;overflow:auto"></div>
    </div>
  </div>
  <div class="panel footer"><span id="hash">WITNESS --------</span><span>T=<span class="val" id="tVal">0.000</span> · nodes <span class="val" id="nVal">1</span> · depth <span class="val" id="dVal">0</span></span></div>
</div>

<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
function resize(){cv.width=innerWidth*devicePixelRatio;cv.height=innerHeight*devicePixelRatio;ctx.setTransform(devicePixelRatio,0,0,devicePixelRatio,0,0)} addEventListener('resize',resize);resize();

const VC={A:'#ffd95a',B:'#e168ff',C:'#32e8ff',D:'#00ffaa'};
const ORA=[
 {l:'A→B outbound. The well releases.',h:'A→B channels. Containment becomes road.'},
 {l:'B→C building. The wave gathers.',h:'B→C surges. Modulation crests.'},
 {l:'C→A arriving. The edge nears.',h:'C→A escapes. Emergence breaks shell.'},
 {l:'A→C retreating. The back begins.',h:'A→C reflects. Return gathers charge.'},
 {l:'C→B inbound. The wave folds.',h:'C→B compresses. Modulation remembers.'},
 {l:'B→A closing. The loop tightens.',h:'B→A completes. Traveler returns empty.'},
 {l:'Home. All fates rest at well.',h:'Witness. The Muse holds zero.'},
 {l:'Forward. The archive pumps next.',h:'= 1 = TENSOR = AEON.'}
];

const VM={
 mode:'pocket',auto:false,phase:0,flux:Math.PI/4,
 nodes:[],
 history:[],
 hash(s){let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return(h>>>0).toString(16).padStart(8,'0')},
 makeNode(parent){
   const base=parent?{a:parent.a,b:parent.b,c:parent.c}:null;
   return{
     a:base?Math.max(0.1,Math.min(1,base.a+(Math.random()-.5)*.3)):0.6,
     b:base?Math.max(0.1,Math.min(1,base.b+(Math.random()-.5)*.3)):0.6,
     c:base?Math.max(0.1,Math.min(1,base.c+(Math.random()-.5)*.3)):0.6,
     phiA:Math.random()*Math.PI*2,phiB:Math.random()*Math.PI*2,phiC:Math.random()*Math.PI*2,
     phase:0,
     orbitA:Math.random()*Math.PI*2,orbitR:220+this.nodes.length*35,orbitS:0.2+Math.random()*0.3,
     children:[],
     depth:parent?(parent.depth+1):0
   };
 },
 contract(n){
   const mag=n.a*n.b*n.c;
   const align=0.5+0.5*Math.cos(n.phiA+n.phiB+n.phiC-3*n.phase);
   return Math.min(1,mag*(1+align));
 },
 step(){
   this.nodes.forEach(n=>{
     n.phiA+=0.04;n.phiB+=0.04;n.phiC+=0.04;
     n.phase=(n.phase+1)%8;
     if(this.mode==='pocket'){
       n.a+=-0.008*(n.a-0.6)+(Math.random()-.5)*.04;
       n.b+=-0.008*(n.b-0.6)+(Math.random()-.5)*.04;
       n.c+=-0.008*(n.c-0.6)+(Math.random()-.5)*.04;
       n.a=Math.max(0.05,Math.min(1,n.a));n.b=Math.max(0.05,Math.min(1,n.b));n.c=Math.max(0.05,Math.min(1,n.c));
     }
     n.orbitA+=n.orbitS*0.02;
   });
   ui();
 }
};

VM.nodes.push(VM.makeNode(null));

function vtx(n,cx,cy){
  const r=90+70*n.a;
  return[
    [cx+Math.cos(-Math.PI/2)*r,cy+Math.sin(-Math.PI/2)*r],
    [cx+Math.cos(Math.PI*0.9)*r,cy+Math.sin(Math.PI*0.9)*r],
    [cx+Math.cos(Math.PI*2.1)*r,cy+Math.sin(Math.PI*2.1)*r]
  ];
}

function drawNode(n,x,y,scale){
  const legs=vtx(n,x,y);
  const T=VM.contract(n);
  const st=ORA[n.phase];
  const txt=T>0.85?st.h:st.l;

  // legs
  [VC.A,VC.B,VC.C].forEach((c,i)=>{
    ctx.save();ctx.strokeStyle=c;ctx.globalAlpha=0.35+0.4*([n.a,n.b,n.c][i]);ctx.lineWidth=3*scale;
    ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(...legs[i]);ctx.stroke();ctx.restore();
    // phase cap
    const ph=[n.phiA,n.phiB,n.phiC][i];
    const cx=legs[i][0]+Math.cos(ph)*12*scale;
    const cy2=legs[i][1]+Math.sin(ph)*12*scale;
    ctx.save();ctx.fillStyle=c;ctx.shadowColor=c;ctx.shadowBlur=10*scale;ctx.globalAlpha=0.8;
    ctx.beginPath();ctx.arc(cx,cy2,5*scale,0,Math.PI*2);ctx.fill();ctx.restore();
    ctx.save();ctx.strokeStyle='#fff';ctx.globalAlpha=0.5;ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(legs[i][0],legs[i][1],8*scale,ph,ph+1.2);ctx.stroke();ctx.restore();
  });

  // center hex
  const hu=(T*240+180)%360;
  ctx.save();ctx.fillStyle=`hsl(${hu},90%,${40+T*55}%)`;ctx.globalAlpha=0.25+T*0.55;
  ctx.shadowColor=`hsl(${hu},90%,70%)`;ctx.shadowBlur=20+40*T;
  ctx.beginPath();
  for(let i=0;i<6;i++){const a=Math.PI/3*i+Math.PI/6;const rx=x+Math.cos(a)*18*scale,ry=y+Math.sin(a)*18*scale;if(i===0)ctx.moveTo(rx,ry);else ctx.lineTo(rx,ry);}
  ctx.closePath();ctx.fill();ctx.restore();

  // value
  ctx.fillStyle=T>0.95?'#fff':`hsl(${hu},80%,70%)`;ctx.font=`${12*scale}px monospace`;ctx.textAlign='center';
  ctx.fillText(T.toFixed(3),x,y+5);

  return txt;
}

function draw(){
  const W=innerWidth,H=innerHeight;
  ctx.fillStyle='rgba(2,3,8,0.25)';ctx.fillRect(0,0,W,H);
  const cx=W*0.5,cy=H*0.48;

  VM.nodes.forEach((n,i)=>{
    const isRoot=i===0;
    const x=isRoot?cx:cx+Math.cos(n.orbitA)*n.orbitR;
    const y=isRoot?cy:cy+Math.sin(n.orbitA)*n.orbitR*0.55;
    const sc=isRoot?1:0.55;
    if(!isRoot){
      ctx.save();ctx.globalAlpha=0.12;ctx.strokeStyle=VC.D;ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(x,y);ctx.stroke();ctx.restore();
    }
    const txt=drawNode(n,x,y,sc);
    if(isRoot){
      document.getElementById('oracle').textContent=txt;
      document.getElementById('tVal').textContent=T.toFixed(3);
      document.getElementById('hash').textContent='WITNESS '+VM.hash(`${i}:${n.phase}:${VM.contract(n).toFixed(4)}`);
    }
  });
  requestAnimationFrame(draw);
}

function ui(){
  const n=VM.nodes[0];
  document.getElementById('tensorRead').innerHTML=
    `T = σ(A) ⊗ σ(B) ⊗ σ(C) · cos(Σφ - 3θ)<br>`+
    `A = ${n.a.toFixed(2)} ∠${(n.phiA%(2*Math.PI)).toFixed(1)} rad<br>`+
    `B = ${n.b.toFixed(2)} ∠${(n.phiB%(2*Math.PI)).toFixed(1)} rad<br>`+
    `C = ${n.c.toFixed(2)} ∠${(n.phiC%(2*Math.PI)).toFixed(1)} rad<br>`+
    `State: ${ORA[n.phase].n||n.phase} · T=${VM.contract(n).toFixed(3)}`;
  document.getElementById('nVal').textContent=VM.nodes.length;
  const d=Math.max(...VM.nodes.map(n=>n.depth));
  document.getElementById('dVal').textContent=d;
  const a=document.getElementById('archive');
  if(VM.history.length)a.innerHTML=VM.history.slice(0,12).map((e,i)=>
    `<div style="color:${e.c}">#${e.id} · ${e.mode} · T=${e.T.toFixed(3)} · ${e.hash.slice(0,8)} · d${e.depth}</div>`
  ).join('');
}

function spawn(){
  const parent=VM.nodes[Math.floor(Math.random()*VM.nodes.length)];
  const child=VM.makeNode(parent);
  VM.nodes.push(child);
  const T=VM.contract(child);
  VM.history.unshift({id:VM.nodes.length-1,mode:VM.mode,T,hash:VM.hash(`${child.depth}:${T}`),depth:child.depth,c:VM.mode==='pocket'?VC.C:VC.A});
  ui();
}

// controls
document.getElementById('modePocket').onclick=()=>{VM.mode='pocket';document.getElementById('modePocket').className='on';document.getElementById('modePerson').className='';document.getElementById('pocketControls').style.display='block';document.getElementById('personControls').style.display='none';};
document.getElementById('modePerson').onclick=()=>{VM.mode='person';document.getElementById('modePerson').className='on';document.getElementById('modePocket').className='';document.getElementById('pocketControls').style.display='none';document.getElementById('personControls').style.display='block';};
document.getElementById('tick').onclick=()=>VM.step();
document.getElementById('auto').onclick=e=>{VM.auto=!VM.auto;e.target.classList.toggle('on',VM.auto);e.target.textContent=VM.auto?'Pause':'Auto';};
document.getElementById('reset').onclick=()=>{VM.nodes=[VM.makeNode(null)];VM.history=[];VM.auto=false;document.getElementById('auto').textContent='Auto';ui();};
document.getElementById('spawn').onclick=spawn;

['sA','sB','sC'].forEach((id,k)=>{
  const el=document.getElementById(id);
  el.oninput=()=>{
    const v=parseInt(el.value,10);
    const n=VM.nodes[0];
    if(k===0)n.a=v/100;if(k===1)n.b=v/100;if(k===2)n.c=v/100;
    document.getElementById('v'+id[1]).textContent=v;
    document.getElementById('f'+id[1]).style.width=v+'%';
    ui();
  };
});

setInterval(()=>{
  if(VM.auto)VM.step();
  if(VM.mode==='pocket'&&VM.nodes.length<24&&VM.contract(VM.nodes[0])>0.92)spawn();
},600);

ui();draw();
</script>
</body>
</html>
